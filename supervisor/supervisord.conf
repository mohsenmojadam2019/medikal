[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/php-fpm.log
stderr_logfile=/var/log/php-fpm-error.log

[program:reverb]
command=php /var/www/artisan reverb:start --host=0.0.0.0 --port=8082
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/reverb.log
stderr_logfile=/var/log/reverb-error.log

[program:queue-worker]
command=php /var/www/artisan queue:work --tries=3 --sleep=3
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/queue-worker.log
stderr_logfile=/var/log/queue-worker-error.log
