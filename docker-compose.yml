#version: '3'

services:

  #PHP Service
  medikall-laravel:
    build:
      context: .
      dockerfile: app.dockerfile
    container_name: medikall-laravel
    tty: true
    env_file: './src/.env'
    working_dir: /var/www
    ports:
      - "9000:9000"
      - "8082:8082"  # اضافه کردن پورت Reverb
    volumes:
      - ./src:/var/www
      - ./supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    command: /usr/bin/supervisord -n -c /etc/supervisor/conf.d/supervisord.conf
    networks:
      - medikall-main-network
    depends_on:
      - medikall-mysql
      - medikall-redis
  #      - medikall-mongodb
  #    command: /bin/bash -c "php-fpm | /usr/bin/supervisord -n -c /etc/supervisor/supervisord.conf"

  #Nginx Service
  medikall-webserver:
    image: nginx
    #    image: docker.arvancloud.ir/nginx
    container_name: medikall-webserver
    restart: unless-stopped
    tty: true
    ports:
      - "8210:80"
    volumes:
      - ./src:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    depends_on:
      - medikall-laravel
    networks:
      - medikall-main-network

  #MySQL Service
  medikall-mysql:
    #    image: docker.arvancloud.ir/mysql
    image: mysql
    container_name: medikall-mysql
    restart: unless-stopped
    tty: true
    ports:
      - "3321:3306"
    volumes:
      - ./medikall:/var/lib/mysql
    environment:
      MYSQL_DATABASE: cms
      MYSQL_PASSWORD: bV7c5smN2T8h4hlMzF90Bpum
      MYSQL_ROOT_PASSWORD: bV7c5smN2T8h4hlMzF90Bpum
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    networks:
      - medikall-main-network

  # phpmyadmin
  medikall-phpmyadmin:
    #    image: docker.arvancloud.ir/phpmyadmin
    image: phpmyadmin
    container_name: medikall-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: medikall-mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 20g
    depends_on:
      - medikall-mysql
    networks:
      - medikall-main-network
    ports:
      - "8310:80"

  #redis service
  medikall-redis:
    #    image: docker.arvancloud.ir/redis
    image: redis
    container_name: medikall-redis
    restart: unless-stopped
#    environment:
#      - REDIS_PASSWORD=password
    ports:
      - 6390:6379
    networks:
      - medikall-main-network

  # Frontend (React/Vue)
  front:
    image: node:23-alpine
    working_dir: /app
    volumes:
      - ./front:/app
    #    command: sh -c "npm run dev"
    command: sh -c "npm run dev"
    ports:
      - "3000:3000"
    networks:
      - medikall-main-network
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:8210
      - NEXT_PUBLIC_FRONTEND_URL=http://localhost:3000
      - NEXT_PUBLIC_REVERB_APP_KEY=your-app-key
      - NEXT_PUBLIC_REVERB_HOST=localhost
      - NEXT_PUBLIC_REVERB_PORT=8082
      - TZ=Asia/Tehran
    stdin_open: true
    tty: true

  # Admin panel (React/Vue)
  admin:
    image: node:23-alpine
    working_dir: /app
    volumes:
      - ./admin:/app
    #    command: sh -c "npm run dev"
    command: sh -c "npm run dev"
    ports:
      - "3001:3001"
    networks:
      - medikall-main-network
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:8210
      - NEXT_PUBLIC_FRONTEND_URL=http://localhost:3001
      - NEXT_PUBLIC_REVERB_APP_KEY=your-app-key
      - NEXT_PUBLIC_REVERB_HOST=localhost
      - NEXT_PUBLIC_REVERB_PORT=8082
      - TZ=Asia/Tehran
    stdin_open: true
    tty: true

  #mongodb service
#  medikall-mongodb:
#    container_name: medikall-mongodb
#    image: docker.arvancloud.ir/mongo:latest
#    environment:
#      - MONGO_INITDB_ROOT_USERNAME=root
#      - MONGO_INITDB_ROOT_PASSWORD=password
