  # اضافه کن به انتهای services بخش
  # Mailpit - Email Testing Tool
  medikall-mailpit:
    image: axllent/mailpit:latest
    container_name: medikall-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP port
      - "8025:8025"   # Web UI
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
    networks:
      - medikall-main-network


